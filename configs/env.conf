# Namespace for ArgoCD
NAMESPACE="argocd"

# FQDN / Host for ArgoCD ingress
HOST="argocd.yourdomain.com"

# TLS secret name in Kubernetes
TLS_SECRET="argocd-tls"

# Path to your certificate and key files
SSL_CERT="./config/ssl/tls.crt"
SSL_KEY="./config/ssl/tls.key"

# ArgoCD version
ARGOCD_VERSION="v2.11.3"

# K3s token (if needed)
K3S_TOKEN="mysecuretoken"