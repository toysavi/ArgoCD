# PATH: gitops-repo/apps/root-app.yaml
# Applied ONCE manually: kubectl apply -f apps/root-app.yaml
# After that, ArgoCD self-manages everything from this repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/toysavi/ArgoCD.git   # ← your repo
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
